server:
  bind_addr: ":18080"
  read_timeout_ms: 30000
  write_timeout_ms: 30000
  max_header_bytes: 1048576
  max_concurrent: 500
  queue_timeout_ms: 5000
  high_priority_ratio: 0.2

proxy:
  target_url: "http://127.0.0.1:18081"
  trust_forwarded: true

rate_limit:
  enabled: true
  requests_per_second: 100
  burst_size: 50
  block_duration_sec: 60

ddos:
  enabled: true
  max_connections_per_ip: 500
  slowloris_timeout_ms: 30000
  challenge_threshold: 500

cc:
  enabled: true
  max_requests: 100
  burst_requests: 150
  window_sec: 60
  env_fingerprint_enabled: true
  pow_challenge_enabled: true
  pow_difficulty: 4

sql_inject:
  enabled: true
  action: block
  severity_level: high

xss:
  enabled: true
  action: block
  filter_response: false

upload:
  enabled: true
  action: block
  max_file_size_mb: 32

brute_force:
  enabled: true
  max_failures: 3
  window_sec: 60
  block_duration_sec: 30
  protected_paths:
    - /login
    - /api/login
    - /api/auth
    - /admin
  status_codes: []

blacklist:
  enabled: true
  persist_path: "/tmp/test_blacklist.json"
  auto_blacklist: false

log:
  level: error
  format: json
  output_path: "/tmp/shield_test.log"
  max_size_mb: 10
  max_backups: 1
  max_age_days: 1

alert:
  enabled: false

rules:
  rules_path: "/tmp/test_rules.yaml"
  hot_reload: false
  reload_interval_sec: 300
