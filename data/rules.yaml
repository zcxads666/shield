version: "1.0"
rules:
    - id: R001
      name: Path Traversal
      description: Detect path traversal attempts
      phase: request
      pattern: \.\./|\.\.\\|%2e%2e
      action: block
      severity: high
      enabled: true
      targets:
        - url
    - id: R002
      name: Command Injection
      description: Detect command injection
      phase: request
      pattern: ;\s*\b(cat|ls|id|whoami|nc|bash|sh|cmd|powershell)\b
      action: block
      severity: critical
      enabled: true
      targets:
        - args
        - body
    - id: R003
      name: Sensitive File Access
      description: Access to sensitive files
      phase: request
      pattern: \b(\.env|\.git|\.htaccess|\.ssh|id_rsa|passwd|shadow)\b
      action: block
      severity: high
      enabled: true
      targets:
        - url
