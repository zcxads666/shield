name: Release (Tag)

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.18"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o shield-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/shield

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shield-${{ matrix.goos }}-${{ matrix.goarch }}
          path: shield-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          find . -type f -name "shield-*" -exec sha256sum {} \; | sort > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            shield-linux-amd64/shield-linux-amd64
            shield-linux-arm64/shield-linux-arm64
            shield-darwin-amd64/shield-darwin-amd64
            shield-darwin-arm64/shield-darwin-arm64
            SHA256SUMS
          generate_release_notes: true
